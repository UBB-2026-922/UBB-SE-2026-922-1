name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_VERSION: 10.0.x
  TEST_FLAGS: --configuration Release --no-restore --logger trx --results-directory TestResults

jobs:
  api-layer-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore domain tests
        run: dotnet restore BankingApp/tests/BankApp.Domain.Tests/BankApp.Domain.Tests.csproj

      - name: Restore application tests
        run: dotnet restore BankingApp/tests/BankApp.Application.Tests/BankApp.Application.Tests.csproj

      - name: Restore infrastructure tests
        run: dotnet restore BankingApp/tests/BankApp.Infrastructure.Tests/BankApp.Infrastructure.Tests.csproj

      - name: Restore infrastructure integration tests
        run: dotnet restore BankingApp/tests/BankApp.Infrastructure.Tests.Integration/BankApp.Infrastructure.Tests.Integration.csproj

      - name: Restore API tests
        run: dotnet restore BankingApp/tests/BankApp.Api.Tests/BankApp.Api.Tests.csproj

      - name: Restore API integration tests
        run: dotnet restore BankingApp/tests/BankApp.Api.Tests.Integration/BankApp.Api.Tests.Integration.csproj

      - name: Run domain tests
        run: dotnet test BankingApp/tests/BankingApp.Domain.Tests/BankingApp.Domain.Tests.csproj ${{ env.TEST_FLAGS }}

      - name: Run application tests
        run: dotnet test BankingApp/tests/BankingApp.Application.Tests/BankingApp.Application.Tests.csproj ${{ env.TEST_FLAGS }}

      - name: Run infrastructure tests
        run: dotnet test BankingApp/tests/BankingApp.Infrastructure.Tests/BankingApp.Infrastructure.Tests.csproj ${{ env.TEST_FLAGS }}

      - name: Run infrastructure integration tests
        run: dotnet test BankingApp/tests/BankingApp.Infrastructure.Tests.Integration/BankingApp.Infrastructure.Tests.Integration.csproj ${{ env.TEST_FLAGS }}

      - name: Run API tests
        run: dotnet test BankingApp/tests/BankingApp.Api.Tests/BankingApp.Api.Tests.csproj ${{ env.TEST_FLAGS }}

      - name: Run API integration tests
        run: dotnet test BankingApp/tests/BankingApp.Api.Tests.Integration/BankingApp.Api.Tests.Integration.csproj ${{ env.TEST_FLAGS }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: '**/TestResults/*.trx'

  desktop-client-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore desktop tests
        run: dotnet restore BankingApp/tests/BankApp.Desktop.Tests/BankApp.Desktop.Tests.csproj

      - name: Run desktop tests
        run: dotnet test BankingApp/tests/BankApp.Desktop.Tests/BankApp.Desktop.Tests.csproj ${{ env.TEST_FLAGS }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-desktop
          path: '**/TestResults/*.trx'
