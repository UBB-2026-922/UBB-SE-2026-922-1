name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore domain tests
        run: dotnet restore tests/BankApp.Domain.Tests/BankApp.Domain.Tests.csproj

      - name: Run domain tests
        run: dotnet test tests/BankApp.Domain.Tests/BankApp.Domain.Tests.csproj --configuration Release

      - name: Run application tests
        run: dotnet test tests/BankApp.Application.Tests/BankApp.Application.Tests.csproj --configuration Release

      - name: Run infrastructure tests
        run: dotnet test tests/BankApp.Infrastructure.Tests/BankApp.Infrastructure.Tests.csproj --configuration Release

      - name: Run infrastructure integration tests
        run: dotnet test tests/BankApp.Infrastructure.Tests.Integration/BankApp.Infrastructure.Tests.Integration.csproj --configuration Release

      - name: Run API tests
        run: dotnet test tests/BankApp.Api.Tests/BankApp.Api.Tests.csproj --configuration Release

      - name: Run API integration tests
        run: dotnet test tests/BankApp.Api.Tests.Integration/BankApp.Api.Tests.Integration.csproj --configuration Release

  desktop-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run desktop tests
        run: dotnet test tests/BankApp.Desktop.Tests/BankApp.Desktop.Tests.csproj --configuration Release
